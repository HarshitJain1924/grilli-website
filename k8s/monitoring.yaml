apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
    rule_files:
      - '/etc/prometheus/alert.rules'
    scrape_configs:
      - job_name: 'grilli-backend'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: backend
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:5000
            target_label: __address__
  alert.rules: |
    groups:
      - name: grilli-alerts
        rules:
          - alert: HighCPUUsage
            expr: rate(process_cpu_user_seconds_total[1m]) * 100 > 70
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: 'High CPU Usage on Backend'
              description: 'CPU usage is above 70% for more than 1 minute.'
          - alert: TargetDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: 'Grilli Backend is DOWN'
              description: 'Prometheus cannot scrape the backend. The server might have crashed!'
          - alert: HighErrorRate
            expr: rate(http_request_duration_seconds_count{status=~"5.."}[1m]) > 0.5
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: 'High HTTP 5xx Error Rate'
              description: 'The backend is returning 500 server errors to users!'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.path=/prometheus"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus
        - name: data-volume
          mountPath: /prometheus
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
      - name: data-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        uid: 'grilli-prom'
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grilli-dashboard
  namespace: monitoring
data:
  grilli-stats.json: |
    {
      "annotations": { "list": [ { "builtIn": 1, "datasource": "-- Grafana --", "enable": true, "hide": true, "iconColor": "rgba(0, 211, 255, 1)", "name": "Annotations & Alerts", "type": "dashboard" } ] },
      "editable": true, "gnetId": null, "graphTooltip": 0, "id": null, "links": [], "panels": [
        { "datasource": "Prometheus", "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 80 } ] } }, "overrides": [] }, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }, "id": 2, "options": { "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single", "sort": "none" } }, "title": "API Request Count", "type": "timeseries", "targets": [ { "expr": "sum(http_request_duration_seconds_count) by (route)", "refId": "A" } ] },
        { "datasource": "Prometheus", "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 80 } ] } }, "overrides": [] }, "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }, "id": 3, "options": { "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single", "sort": "none" } }, "title": "Memory Usage (MB)", "type": "timeseries", "targets": [ { "expr": "nodejs_external_memory_bytes / 1024 / 1024", "refId": "A" } ] },
        { "datasource": "Prometheus", "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 70 } ] } }, "overrides": [] }, "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 }, "id": 4, "options": { "legend": { "calcs": [], "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single", "sort": "none" } }, "title": "CPU Usage (%)", "type": "timeseries", "targets": [ { "expr": "rate(process_cpu_user_seconds_total[1m]) * 100", "refId": "A" } ] }
      ], "schemaVersion": 30, "style": "dark", "tags": [], "templating": { "list": [] }, "time": { "from": "now-15m", "to": "now" }, "timepicker": {}, "timezone": "", "title": "Grilli Website Monitoring", "uid": "grilli-stats", "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_SMTP_ENABLED
          value: "true"
        - name: GF_SMTP_SKIP_VERIFY
          value: "true"
        - name: GF_SMTP_FROM_ADDRESS
          valueFrom:
            secretKeyRef:
              name: grilli-secrets
              key: SMTP_USER
        - name: GF_SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: grilli-secrets
              key: SMTP_HOST
        - name: GF_SMTP_USER
          valueFrom:
            secretKeyRef:
              name: grilli-secrets
              key: SMTP_USER
        - name: GF_SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grilli-secrets
              key: SMTP_PASSWORD
        volumeMounts:
        - name: provisioning-volume
          mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
          subPath: datasource.yaml
        - name: provisioning-volume
          mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yaml
          subPath: dashboard-provider.yaml

        - name: dashboard-volume
          mountPath: /var/lib/grafana/dashboards
      volumes:
      - name: provisioning-volume
        configMap:
          name: grafana-provisioning
      - name: dashboard-volume
        configMap:
          name: grilli-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
# RBAC for Prometheus to see pods
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: default
  namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  email.tmpl: |
    {{ define "email.html" }}
    <div style="font-family: Arial, sans-serif; padding: 20px;">
      <h2 style="color: #ff4d4f;">🔥 Grilli Alerts System: {{ .Status | toUpper }}</h2>
      <p><b>Total Active Alerts:</b> {{ len .Alerts }}</p>
      <table border="1" cellpadding="10" style="border-collapse: collapse; width: 100%;">
        <tr style="background-color: #f0f0f0;">
          <th>Alert Name</th>
          <th>Severity</th>
          <th>Summary</th>
          <th>Description</th>
        </tr>
        {{ range .Alerts }}
        <tr>
          <td><b>{{ .Labels.alertname }}</b></td>
          <td style="color: {{ if eq .Labels.severity "critical" }}red{{ else }}orange{{ end }};"><b>{{ .Labels.severity | toUpper }}</b></td>
          <td>{{ .Annotations.summary }}</td>
          <td>{{ .Annotations.description }}</td>
        </tr>
        {{ end }}
      </table>
    </div>
    {{ end }}

  alertmanager.yml: |
    global:
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'harshit1924jain@gmail.com'
      smtp_auth_username: 'harshit1924jain@gmail.com'
      smtp_auth_password_file: '/etc/alertmanager/secrets/SMTP_PASSWORD'
      smtp_require_tls: true

    templates:
      - '/etc/alertmanager/email.tmpl'

    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      receiver: 'email-admin'

    receivers:
    - name: 'email-admin'
      email_configs:
      - to: 'harshit1924jain@gmail.com'
        html: '{{ template "email.html" . }}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:latest
        args:
          - "--config.file=/etc/alertmanager/alertmanager.yml"
        ports:
        - containerPort: 9093
        volumeMounts:
        - name: config-volume
          mountPath: /etc/alertmanager
        - name: secret-volume
          mountPath: /etc/alertmanager/secrets
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: alertmanager-config
      - name: secret-volume
        secret:
          secretName: grilli-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - protocol: TCP
      port: 9093
      targetPort: 9093
